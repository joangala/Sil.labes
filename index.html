<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sílabas">
<title>Sílabas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;}
button{font-family:inherit;font-weight:800;}

#settings{
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:40px 24px 40px;overflow:auto;
  background:linear-gradient(180deg,#FFF8F0 0%,#FFF2E8 100%);
}
#settings h1{font-size:42px;font-weight:900;color:#3D3530;margin:0 0 8px;letter-spacing:-1px;}
#settings .subtitle{font-size:18px;color:#9E958A;margin:0 0 28px;font-weight:600;}
.section{margin-bottom:24px;width:100%;max-width:560px;}
.section-title{font-size:15px;font-weight:800;color:#7A7168;text-transform:uppercase;
  letter-spacing:1.5px;margin:0 0 12px;text-align:center;}
.chip-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.chip-row.tight{gap:8px;}
.chip{
  padding:10px 20px;font-size:20px;min-width:54px;
  border:3px solid #DDD8CF;border-radius:16px;
  background:#FAF8F5;color:#B0A99F;font-weight:800;
  cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.chip.small{padding:6px 14px;font-size:16px;min-width:44px;}
.chip.active{border-color:#FF6B5B;background:#FFF0EE;color:#E8453C;}
.count-btn{
  width:56px;height:56px;border-radius:16px;border:3px solid #DDD8CF;
  background:#FAF8F5;color:#B0A99F;font-size:24px;font-weight:900;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.count-btn.active{border-color:#FF6B5B;background:#FF6B5B;color:#FFF;}
#play-btn{
  margin-top:24px;padding:18px 64px;border-radius:24px;border:none;
  background:#FF6B5B;color:#FFF;font-size:28px;font-weight:900;
  box-shadow:0 6px 24px rgba(255,107,91,0.35);cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#play-btn:disabled{background:#DDD8CF;box-shadow:none;cursor:default;}

#game{
  height:100dvh;display:none;flex-direction:column;overflow:hidden;touch-action:none;
  background:linear-gradient(180deg,#FFF8F0 0%,#FFF2E8 100%);
}
.game-header{
  background:linear-gradient(135deg,#FFD93D 0%,#FFB830 100%);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 16px rgba(255,184,48,0.3);flex-shrink:0;
}
.back-btn{
  width:48px;height:48px;border-radius:24px;background:rgba(255,255,255,0.4);
  border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#7A5C1F;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.progress{display:flex;gap:8px;}
.progress-dot{width:18px;height:18px;border-radius:9px;background:rgba(255,255,255,0.35);transition:all 0.3s;}
.progress-dot.done{background:#FFF;transform:scale(1.25);}
.game-area{
  flex:1;display:flex;flex-direction:column;justify-content:space-evenly;
  align-items:center;padding:12px 24px;
}
.hint{font-size:20px;color:#C4BBB0;font-weight:700;text-align:center;transition:opacity 0.5s;}
.card-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.card{
  border-radius:32px;display:flex;align-items:center;justify-content:center;
  font-weight:900;letter-spacing:-1px;box-shadow:0 6px 20px rgba(0,0,0,0.08);
  -webkit-tap-highlight-color:transparent;touch-action:none;transition:all 0.3s ease;cursor:grab;
}
.card.matched{
  background:transparent!important;border:4px dashed #E8E4DD!important;
  color:transparent!important;box-shadow:none!important;opacity:0.25;cursor:default;
}
.shadow{
  border-radius:32px;display:flex;align-items:center;justify-content:center;
  font-weight:900;letter-spacing:-1px;color:#E0DBD3;
  background:#F3F0EB;border:5px dashed #DDD8CF;
  -webkit-tap-highlight-color:transparent;touch-action:none;transition:all 0.15s ease;
}
.shadow.matched{animation:popIn 0.4s ease;}
.shadow.wrong-shake{animation:shake 0.4s ease;}
.arrow{font-size:36px;color:#E0DBD3;line-height:1;animation:floatArrow 1.5s ease-in-out infinite;}
.drag-clone{
  position:fixed;border-radius:32px;background:#FFF;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;letter-spacing:-1px;
  z-index:5000;pointer-events:none;transform:scale(1.08) rotate(-2deg);
}
.star{position:absolute;width:18px;height:18px;font-size:18px;animation:starBurst 0.7s ease-out forwards;}
.confetti-piece{position:absolute;animation-fill-mode:forwards;}
#overlay{
  position:fixed;inset:0;z-index:10000;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(255,248,240,0.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#overlay h2{font-size:80px;font-weight:900;color:#FF6B5B;animation:bounceIn 0.6s ease;
  text-shadow:0 4px 24px rgba(255,107,91,0.3);}
#overlay .emoji{font-size:52px;margin:8px 0 0;}
#overlay .sub{font-size:24px;color:#9E958A;margin-top:10px;font-weight:700;}
#overlay .btns{display:flex;gap:16px;margin-top:36px;}
.btn-next{
  padding:18px 48px;border-radius:24px;border:none;background:#FF6B5B;color:#FFF;
  font-size:26px;font-weight:900;box-shadow:0 6px 24px rgba(255,107,91,0.35);
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn-settings{
  padding:18px 36px;border-radius:24px;border:3px solid #DDD8CF;background:#FFF;
  color:#9E958A;font-size:22px;font-weight:800;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
@keyframes starBurst{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0.2);opacity:0;}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-12px);}40%{transform:translateX(12px);}60%{transform:translateX(-8px);}80%{transform:translateX(6px);}}
@keyframes popIn{0%{transform:scale(0.7);}50%{transform:scale(1.14);}100%{transform:scale(1);}}
@keyframes bounceIn{0%{transform:scale(0.3) translateY(40px);opacity:0;}50%{transform:scale(1.1) translateY(-10px);opacity:1;}70%{transform:scale(0.95);}100%{transform:scale(1) translateY(0);}}
@keyframes floatArrow{0%,100%{transform:translateY(0);opacity:0.5;}50%{transform:translateY(10px);opacity:1;}}
</style>
</head>
<body>

<div id="settings">
  <h1>🔤 Sílabas</h1>
  <p class="subtitle">Configura las sílabas para jugar</p>
  <div class="section"><div class="section-title">Vocales</div><div id="vowel-chips" class="chip-row"></div></div>
  <div class="section"><div class="section-title">Consonantes</div><div id="cons-chips" class="chip-row tight"></div></div>
  <div class="section"><div class="section-title">Tipos de sílaba</div><div id="type-chips" class="chip-row"></div></div>
  <div class="section"><div class="section-title" id="count-label">Sílabas por ronda: 4</div><div id="count-chips" class="chip-row"></div></div>
  <button id="play-btn" onclick="startGame()">¡Jugar! 🎮</button>
</div>

<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="showSettings()">✕</button>
    <div class="progress" id="progress"></div>
    <div style="width:48px"></div>
  </div>
  <div class="game-area">
    <p class="hint" id="hint">Arrastra cada sílaba a su sombra 👇</p>
    <div class="card-row" id="top-row"></div>
    <div class="arrow">⬇</div>
    <div class="card-row" id="bottom-row"></div>
  </div>
</div>

<div class="drag-clone" id="drag-clone" style="display:none;"></div>
<div id="stars-container" style="position:fixed;pointer-events:none;z-index:9998;"></div>
<div id="confetti-container" style="position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;"></div>

<div id="overlay">
  <h2>¡BRAVO!</h2>
  <div class="emoji">🎉🌟🎉</div>
  <div class="sub">¡Todas las sílabas emparejadas!</div>
  <div class="btns">
    <button class="btn-next" onclick="nextRound()">Siguiente ▶</button>
    <button class="btn-settings" onclick="showSettings()">⚙</button>
  </div>
</div>

<script>
var ALL_VOWELS=["A","E","I","O","U"];
var ALL_CONSONANTS=["B","C","D","F","G","J","K","L","M","N","Ñ","P","R","S","T","V","Z"];
var TRABADAS=["BL","BR","CL","CR","DR","FL","FR","GL","GR","PL","PR","TR"];
var COLORS=["#FF6B5B","#4ECDC4","#FFB830","#A78BFA","#34D399","#F472B6","#FF8C42","#6C9FFF"];

var cfg={vowels:new Set(["A","E","I","O","U"]),consonants:new Set(["M","P","S","T","L"]),count:4,directas:true,trabadas:false};
var syllables=[],shadowOrder=[],matched=new Set(),colorMap={};
var dragIdx=null,dragPos=null,hoverShadowIdx=null,roundDone=false;

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function toggleSet(s,item){if(s.has(item)){if(s.size>1)s.delete(item);}else s.add(item);}

function generateSyllables(){
  var pool=[],vowels=Array.from(cfg.vowels),consonants=Array.from(cfg.consonants);
  if(cfg.directas)for(var ci=0;ci<consonants.length;ci++)for(var vi=0;vi<vowels.length;vi++)pool.push(consonants[ci]+vowels[vi]);
  if(cfg.trabadas)for(var ti=0;ti<TRABADAS.length;ti++)if(consonants.indexOf(TRABADAS[ti][0])>=0)for(var vi2=0;vi2<vowels.length;vi2++)pool.push(TRABADAS[ti]+vowels[vi2]);
  if(!pool.length)return[];
  var sh=shuffle(pool),sel=[],used={};
  for(var i=0;i<sh.length;i++){if(!used[sh[i]]){sel.push(sh[i]);used[sh[i]]=true;if(sel.length>=cfg.count)break;}}
  while(sel.length<cfg.count)sel.push(pool[Math.floor(Math.random()*pool.length)]);
  return sel;
}

/* ═══ AUDIO — persistent context for Safari iOS ═══ */
var audioCtx=null;
function ensureAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(audioCtx&&audioCtx.state==="suspended"){try{audioCtx.resume();}catch(e){}}
  /* Unlock speechSynthesis on iOS by speaking empty string */
  try{var u=new SpeechSynthesisUtterance("");u.volume=0;speechSynthesis.speak(u);}catch(e){}
}

function speakSyllable(text){
  try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text.toLowerCase());
  u.lang="es-ES";u.rate=0.7;u.pitch=1.1;u.volume=1;speechSynthesis.speak(u);}catch(e){}
}

function playTone(freqs,dur){
  dur=dur||0.12;
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(audioCtx.state==="suspended"){try{audioCtx.resume();}catch(e){}}
  try{
  for(var i=0;i<freqs.length;i++){(function(f,idx){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=f;
    g.gain.setValueAtTime(0.22,audioCtx.currentTime+idx*dur);
    g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+(idx+1)*dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+idx*dur);o.stop(audioCtx.currentTime+(idx+1)*dur+0.05);
  })(freqs[i],i);}
  }catch(e){}
}

/* ═══ SETTINGS ═══ */
function buildSettings(){
  var vc=document.getElementById("vowel-chips");vc.innerHTML="";
  ALL_VOWELS.forEach(function(v){
    var b=document.createElement("button");b.className="chip"+(cfg.vowels.has(v)?" active":"");
    b.textContent=v;b.onclick=function(){toggleSet(cfg.vowels,v);buildSettings();};vc.appendChild(b);
  });
  var cc=document.getElementById("cons-chips");cc.innerHTML="";
  ALL_CONSONANTS.forEach(function(c){
    var b=document.createElement("button");b.className="chip small"+(cfg.consonants.has(c)?" active":"");
    b.textContent=c;b.onclick=function(){toggleSet(cfg.consonants,c);buildSettings();};cc.appendChild(b);
  });
  var tc=document.getElementById("type-chips");tc.innerHTML="";
  [["Directas (MA, PE)","directas"],["Trabadas (BRA, CLE)","trabadas"]].forEach(function(pair){
    var b=document.createElement("button");b.className="chip"+(cfg[pair[1]]?" active":"");
    b.textContent=pair[0];b.onclick=function(){
      var other=pair[1]==="directas"?"trabadas":"directas";
      if(cfg[pair[1]]&&!cfg[other])return;cfg[pair[1]]=!cfg[pair[1]];buildSettings();
    };tc.appendChild(b);
  });
  var cntc=document.getElementById("count-chips");cntc.innerHTML="";
  [3,4,5].forEach(function(n){
    var b=document.createElement("button");b.className="count-btn"+(cfg.count===n?" active":"");
    b.textContent=n;b.onclick=function(){cfg.count=n;buildSettings();};cntc.appendChild(b);
  });
  document.getElementById("count-label").textContent="Sílabas por ronda: "+cfg.count;
  document.getElementById("play-btn").disabled=!(cfg.directas||cfg.trabadas)&&cfg.vowels.size>0&&cfg.consonants.size>0?true:false;
  document.getElementById("play-btn").disabled=!((cfg.directas||cfg.trabadas)&&cfg.vowels.size>0&&cfg.consonants.size>0);
}

function showSettings(){
  document.getElementById("settings").style.display="flex";
  document.getElementById("game").style.display="none";
  document.getElementById("overlay").style.display="none";
  buildSettings();
}

function startGame(){
  ensureAudio();
  document.getElementById("settings").style.display="none";
  document.getElementById("game").style.display="flex";
  initRound();
}

function initRound(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("confetti-container").innerHTML="";
  syllables=generateSyllables();
  var indices=[];for(var i=0;i<syllables.length;i++)indices.push(i);
  shadowOrder=shuffle(indices);
  matched=new Set();colorMap={};
  for(var i=0;i<syllables.length;i++)colorMap[i]=COLORS[i%COLORS.length];
  dragIdx=null;dragPos=null;hoverShadowIdx=null;roundDone=false;
  renderGame();
}

function nextRound(){if(audioCtx&&audioCtx.state==="suspended"){try{audioCtx.resume();}catch(e){}}initRound();}

/* ═══ RENDER ═══ */
function getCardSize(){return syllables.length>=5?200:240;}
function getFS(syl){var base=syllables.length>=5?68:86;return syl.length>2?Math.round(base*0.82):base;}

function renderGame(){
  var cs=getCardSize();
  var prog=document.getElementById("progress");prog.innerHTML="";
  for(var i=0;i<syllables.length;i++){
    var d=document.createElement("div");d.className="progress-dot"+(matched.has(i)?" done":"");prog.appendChild(d);
  }
  document.getElementById("hint").style.opacity=matched.size===0?"1":"0";

  var top=document.getElementById("top-row");top.innerHTML="";
  for(var i=0;i<syllables.length;i++){
    (function(idx){
      var syl=syllables[idx];var el=document.createElement("div");
      el.className="card"+(matched.has(idx)?" matched":"");
      el.style.width=el.style.height=cs+"px";el.style.fontSize=getFS(syl)+"px";
      if(!matched.has(idx)){el.style.background="#FFF";el.style.border="5px solid "+colorMap[idx];el.style.color=colorMap[idx];}
      el.textContent=syl;
      if(!matched.has(idx)){
        el.addEventListener("touchstart",function(e){onTouchStart(e,idx);},{passive:false});
        el.addEventListener("touchmove",function(e){onTouchMove(e,idx);},{passive:false});
        el.addEventListener("touchend",function(e){onTouchEnd(e,idx);},{passive:false});
        el.addEventListener("mousedown",function(e){onMouseDown(e,idx);});
      }
      top.appendChild(el);
    })(i);
  }

  var bot=document.getElementById("bottom-row");bot.innerHTML="";
  for(var si=0;si<shadowOrder.length;si++){
    (function(shIdx){
      var syllIdx=shadowOrder[shIdx];var syl=syllables[syllIdx];
      var el=document.createElement("div");
      el.className="shadow"+(matched.has(syllIdx)?" matched":"");
      el.style.width=el.style.height=cs+"px";el.style.fontSize=getFS(syl)+"px";
      if(matched.has(syllIdx)){el.style.background=colorMap[syllIdx]+"15";el.style.border="5px solid "+colorMap[syllIdx];el.style.color=colorMap[syllIdx];}
      el.textContent=syl;
      bot.appendChild(el);
    })(si);
  }
}

/* ═══ HIT DETECTION ═══ */
function findShadowUnder(x,y){
  var shadows=document.getElementById("bottom-row").children;
  for(var i=0;i<shadows.length;i++){
    var r=shadows[i].getBoundingClientRect();var pad=30;
    if(x>=r.left-pad&&x<=r.right+pad&&y>=r.top-pad&&y<=r.bottom+pad)return i;
  }return null;
}
function getShadowEl(shIdx){return document.getElementById("bottom-row").children[shIdx]||null;}

/* ═══ DRAG — TOUCH ═══ */
function onTouchStart(e,idx){
  if(matched.has(idx)||roundDone)return;e.preventDefault();
  if(audioCtx&&audioCtx.state==="suspended"){try{audioCtx.resume();}catch(e){}}
  var t=e.touches[0];dragIdx=idx;dragPos={x:t.clientX,y:t.clientY};
  showClone(idx,dragPos);highlightCard(idx,true);
}
function onTouchMove(e,idx){
  if(dragIdx===null||roundDone)return;e.preventDefault();
  var t=e.touches[0];dragPos={x:t.clientX,y:t.clientY};moveClone(dragPos);
  updateShadowHover(findShadowUnder(t.clientX,t.clientY));
}
function onTouchEnd(e,idx){
  if(dragIdx===null||!dragPos){resetDrag();return;}
  handleDrop(idx,findShadowUnder(dragPos.x,dragPos.y));
}

/* ═══ DRAG — MOUSE ═══ */
var mouseIsDown=false,mouseDragIdx=null;
function onMouseDown(e,idx){
  if(matched.has(idx)||roundDone)return;e.preventDefault();
  mouseIsDown=true;mouseDragIdx=idx;dragIdx=idx;
  dragPos={x:e.clientX,y:e.clientY};showClone(idx,dragPos);highlightCard(idx,true);
}
document.addEventListener("mousemove",function(e){
  if(!mouseIsDown||mouseDragIdx===null)return;
  dragPos={x:e.clientX,y:e.clientY};moveClone(dragPos);
  updateShadowHover(findShadowUnder(e.clientX,e.clientY));
});
document.addEventListener("mouseup",function(e){
  if(!mouseIsDown||mouseDragIdx===null){mouseIsDown=false;return;}
  var idx=mouseDragIdx;handleDrop(idx,findShadowUnder(e.clientX,e.clientY));
  mouseIsDown=false;mouseDragIdx=null;
});

/* ═══ DRAG HELPERS ═══ */
function showClone(idx,pos){
  var cl=document.getElementById("drag-clone");var cs=getCardSize();var syl=syllables[idx];
  cl.style.display="flex";cl.style.width=cl.style.height=cs+"px";
  cl.style.fontSize=getFS(syl)+"px";cl.style.color=colorMap[idx];
  cl.style.border="5px solid "+colorMap[idx];
  cl.style.boxShadow="0 16px 48px rgba(0,0,0,0.2), 0 0 0 4px "+colorMap[idx]+"33";
  cl.textContent=syl;moveClone(pos);
}
function moveClone(pos){
  var cl=document.getElementById("drag-clone");var cs=getCardSize();
  cl.style.left=(pos.x-cs/2)+"px";cl.style.top=(pos.y-cs/2)+"px";
}
function hideClone(){document.getElementById("drag-clone").style.display="none";}
function highlightCard(idx,on){
  var cards=document.getElementById("top-row").children;
  if(cards[idx]){cards[idx].style.transform=on?"scale(0.8)":"scale(1)";
    cards[idx].style.opacity=on?"0.3":"1";cards[idx].style.transition=on?"none":"all 0.3s ease";}
}
function updateShadowHover(shIdx){
  var shadows=document.getElementById("bottom-row").children;
  for(var i=0;i<shadows.length;i++){
    var si=shadowOrder[i];if(matched.has(si))continue;
    shadows[i].style.background="#F3F0EB";shadows[i].style.border="5px dashed #DDD8CF";
    shadows[i].style.transform="scale(1)";shadows[i].className="shadow";
  }
  hoverShadowIdx=shIdx;
  if(shIdx===null||dragIdx===null)return;
  var si=shadowOrder[shIdx];if(matched.has(si))return;
  var el=shadows[shIdx],correct=syllables[dragIdx]===syllables[si];
  if(correct){el.style.background=colorMap[dragIdx]+"25";el.style.border="5px solid "+colorMap[dragIdx];el.style.transform="scale(1.06)";}
  else{el.style.background="#FFEAE8";el.style.border="5px dashed #FF9999";}
}

function handleDrop(cardIdx,shIdx){
  if(shIdx!==null){
    var si=shadowOrder[shIdx];
    if(!matched.has(si)&&syllables[cardIdx]===syllables[si]){doMatch(cardIdx,shIdx);return;}
    else if(!matched.has(si)){
      var el=getShadowEl(shIdx);if(el){el.className="shadow wrong-shake";setTimeout(function(){if(el)el.className="shadow";},500);}
    }
  }
  resetDrag();
}

function resetDrag(){if(dragIdx!==null)highlightCard(dragIdx,false);hideClone();updateShadowHover(null);dragIdx=null;dragPos=null;}

/* ═══ MATCH & CELEBRATE ═══ */
function doMatch(cardIdx,shIdx){
  hideClone();highlightCard(cardIdx,false);updateShadowHover(null);
  var shadowEl=getShadowEl(shIdx);
  if(shadowEl){var rect=shadowEl.getBoundingClientRect();showStarBurst(rect.left+rect.width/2,rect.top+rect.height/2);}
  playTone([523,659,784]);
  var capSyl=syllables[cardIdx];
  setTimeout(function(){speakSyllable(capSyl);},350);
  var cards=document.getElementById("top-row").children;
  if(cards[cardIdx])cards[cardIdx].style.transform="scale(0.85)";
  var cIdx=cardIdx;
  setTimeout(function(){
    matched.add(cIdx);dragIdx=null;dragPos=null;renderGame();
    if(matched.size===syllables.length){
      setTimeout(function(){playTone([523,659,784,1047,1319],0.15);showConfetti();roundDone=true;
        document.getElementById("overlay").style.display="flex";},400);
    }
  },450);
}

function showStarBurst(x,y){
  var c=document.getElementById("stars-container");
  var w=document.createElement("div");w.style.cssText="position:fixed;left:"+x+"px;top:"+y+"px;pointer-events:none;";
  for(var i=0;i<10;i++){
    var a=(i/10)*Math.PI*2,tx=Math.cos(a)*70,ty=Math.sin(a)*70;
    var s=document.createElement("div");s.className="star";
    s.style.cssText="left:-9px;top:-9px;--tx:"+tx+"px;--ty:"+ty+"px;";
    s.textContent="⭐";w.appendChild(s);
  }
  c.appendChild(w);setTimeout(function(){w.remove();},900);
}

function showConfetti(){
  var c=document.getElementById("confetti-container");c.innerHTML="";
  for(var i=0;i<60;i++){
    var p=document.createElement("div");var size=8+Math.random()*14;
    var isC=Math.random()>0.5;var color=COLORS[Math.floor(Math.random()*COLORS.length)];
    var delay=Math.random()*0.6;var dur=1.5+Math.random();
    p.className="confetti-piece";
    p.style.cssText="left:"+Math.random()*100+"%;top:-5%;width:"+size+"px;height:"+(isC?size:size*0.6)+"px;border-radius:"+(isC?"50%":"2px")+";background:"+color+";animation:confettiFall "+dur+"s ease-in "+delay+"s forwards;transform:rotate("+Math.random()*360+"deg);";
    c.appendChild(p);
  }
}

showSettings();
</script>
